# ========================
# SERVER CONFIGURATION
# ========================
server.port=${SERVER_PORT:8080}

# ========================
# DATASOURCE (PostgreSQL)
# ========================
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ticket_booking_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ========================
# REDIS
# ========================
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ========================
# JWT CONFIGURATION
# ========================
jwt.secret=${JWT_SECRET:dGlja2V0Ym9va2luZ3N5c3RlbXNlY3JldGtleWZvcmp3dHRva2VuMjAyNg==}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ========================
# APPLICATION
# ========================
spring.application.name=ticket-booking-system
